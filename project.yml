name: NovaClipboard
options:
  bundleIdPrefix: io.haunc
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    # CI overrides these at archive time from the git tag.
    # Local dev builds use these as-is.
    MARKETING_VERSION: "0.0.0-dev"
    CURRENT_PROJECT_VERSION: "0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  NovaClipboard:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NovaClipboard
        excludes:
          - "**/.DS_Store"
          - "**/.gitkeep"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.haunc.NovaClipboard
        PRODUCT_NAME: NovaClipboard
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NovaClipboard/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES

  NovaClipboardTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NovaClipboardTests
    dependencies:
      - target: NovaClipboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.haunc.NovaClipboardTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NovaClipboard.app/Contents/MacOS/NovaClipboard"

schemes:
  NovaClipboard:
    build:
      targets:
        NovaClipboard: all
        NovaClipboardTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NovaClipboardTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
