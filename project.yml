name: NovaClipboard
options:
  bundleIdPrefix: io.creativeforce
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  NovaClipboard:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: NovaClipboard
        excludes:
          - "**/.DS_Store"
          - "**/.gitkeep"
    info:
      path: NovaClipboard/Resources/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Creative Force. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.creativeforce.NovaClipboard
        PRODUCT_NAME: NovaClipboard
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NovaClipboard/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES

  NovaClipboardTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: NovaClipboardTests
    dependencies:
      - target: NovaClipboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.creativeforce.NovaClipboardTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NovaClipboard.app/Contents/MacOS/NovaClipboard"

schemes:
  NovaClipboard:
    build:
      targets:
        NovaClipboard: all
        NovaClipboardTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NovaClipboardTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
