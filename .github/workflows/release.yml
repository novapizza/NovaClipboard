name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-mac:
    environment: Production

    name: Build and Publish macOS
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history so rev-list count is correct

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen && brew pin xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Version from tag ────────────────────────────────────────────────────
      # Tag push:        GITHUB_REF_NAME is the tag (e.g. v0.2.0)
      # workflow_dispatch: GITHUB_REF_NAME is a branch — fall back to latest tag.
      - name: Extract version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || true)
            [ -n "$TAG" ] || { echo "ERROR: no v*.*.* tag found in history"; exit 1; }
          else
            TAG="$GITHUB_REF_NAME"
          fi
          VERSION="${TAG#v}"

          # Validate semver
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "ERROR: version '$VERSION' is not semver MAJOR.MINOR.PATCH"; exit 1;
          }

          # Build number = commit count up to the tag. Monotonic across history.
          BUILD=$(git rev-list --count "$TAG")

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "BUILD=$BUILD" >> $GITHUB_ENV
          echo "Releasing $TAG (marketing=$VERSION, build=$BUILD)"

      # ── Code-signing keychain ─────────────────────────────────────────────────
      - name: Set up signing keychain
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KC_PASS=$(openssl rand -hex 32)

          security create-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"

          trap 'rm -f /tmp/cert.p12' EXIT
          [ -n "$CSC_LINK" ] || { echo "ERROR: CSC_LINK empty"; exit 1; }
          [ -n "$CSC_KEY_PASSWORD" ] || { echo "ERROR: CSC_KEY_PASSWORD empty"; exit 1; }
          echo "$CSC_LINK" | base64 -d > /tmp/cert.p12

          security import /tmp/cert.p12 \
            -P "$CSC_KEY_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -A -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KC_PASS" \
            "$KEYCHAIN_PATH"

          # Add to user keychain search list so xcodebuild can find it
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      # ── Build & archive ───────────────────────────────────────────────────────
      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project NovaClipboard.xcodeproj \
            -scheme NovaClipboard \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/NovaClipboard.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
          # Verify archive was created
          [ -d "$RUNNER_TEMP/NovaClipboard.xcarchive" ] || { echo "ERROR: archive missing"; exit 1; }

      # ── Export ────────────────────────────────────────────────────────────────
      - name: Export archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NovaClipboard.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          [ -d "$RUNNER_TEMP/export/NovaClipboard.app" ] || { echo "ERROR: export missing"; exit 1; }

      # ── Notarize app ─────────────────────────────────────────────────────────
      - name: Notarize .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/NovaClipboard.app" \
            /tmp/NovaClipboard-app.zip

          xcrun notarytool submit /tmp/NovaClipboard-app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/NovaClipboard.app"
          xcrun stapler validate "$RUNNER_TEMP/export/NovaClipboard.app"

      # ── Package DMG ───────────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          brew install create-dmg
          DMG_PATH="$RUNNER_TEMP/NovaClipboard-$VERSION.dmg"

          # create-dmg exits 2 on headless CI (AppleScript icon-positioning needs display)
          # DMG is still created — gate on file existence, not exit code
          create-dmg \
            --volname "NovaClipboard $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 180 \
            "$DMG_PATH" \
            "$RUNNER_TEMP/export/NovaClipboard.app" || true
          [ -f "$DMG_PATH" ] || { echo "ERROR: DMG missing"; exit 1; }

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      # ── Notarize DMG ─────────────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      # ── Generate Sparkle appcast ─────────────────────────────────────────────
      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          DOWNLOAD_URL_PREFIX: ${{ secrets.SPARKLE_DOWNLOAD_URL_PREFIX }}
        run: |
          [ -n "$SPARKLE_ED_PRIVATE_KEY" ] || { echo "ERROR: SPARKLE_ED_PRIVATE_KEY empty"; exit 1; }
          [ -n "$DOWNLOAD_URL_PREFIX" ] || { echo "ERROR: SPARKLE_DOWNLOAD_URL_PREFIX empty"; exit 1; }

          # Locate Sparkle tool binaries inside the resolved SPM cache
          SPARKLE_BIN=$(find "$HOME/Library/Developer/Xcode/DerivedData" \
            -type d -name "Sparkle-*" -path "*/SourcePackages/artifacts/*" 2>/dev/null \
            | head -n1)/bin
          if [ ! -x "$SPARKLE_BIN/generate_appcast" ]; then
            echo "Sparkle bin not found, falling back to brew install" >&2
            brew install --cask sparkle 2>/dev/null || true
            SPARKLE_BIN="/opt/homebrew/Caskroom/sparkle/$(ls /opt/homebrew/Caskroom/sparkle | head -n1)/bin"
          fi

          APPCAST_DIR="$RUNNER_TEMP/appcast"
          mkdir -p "$APPCAST_DIR"
          cp "$DMG_PATH" "$APPCAST_DIR/"

          # Private key fed via env var so it never lands on disk
          "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
            "$APPCAST_DIR" <<< "$SPARKLE_ED_PRIVATE_KEY"

          [ -f "$APPCAST_DIR/appcast.xml" ] || { echo "ERROR: appcast.xml missing"; exit 1; }
          echo "APPCAST_PATH=$APPCAST_DIR/appcast.xml" >> $GITHUB_ENV

      # ── Upload to R2 ─────────────────────────────────────────────────────────
      - name: Upload to R2
        env:
          # R2 is S3-compatible. Use provider: s3 with custom endpoint
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
        run: |
          ENDPOINT="https://$R2_RELEASES_ACCOUNT_ID.r2.cloudflarestorage.com"

          aws s3 cp "$DMG_PATH" \
            "s3://$R2_RELEASES_BUCKET/NovaClipboard-$VERSION.dmg" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp "$APPCAST_PATH" \
            "s3://$R2_RELEASES_BUCKET/appcast.xml" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/xml" \
            --cache-control "public, max-age=300"

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
          else
            gh release create "$TAG" \
              --title "NovaClipboard $TAG" \
              --generate-notes \
              "$DMG_PATH"
          fi

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
